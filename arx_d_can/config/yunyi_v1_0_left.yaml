name: Yunyi V1.0 Left Arm
urdf_path: models/yunyi_v1_0.urdf
end_effector_frame: l-link7

# The left-arm USB2CAN currently exposes arm motor IDs 0x09..0x0F.
channel: /dev/ttyACM0
baud: 1000000
rate: 500

safety:
  watchdog_enabled: true
  command_timeout_s: 0.25
  enable_grace_s: 2.0
  watchdog_poll_s: 0.02
  watchdog_action: safe_hold
  safe_hold_hz: 100.0
  feedback_fault_threshold: 3

groups:
  arm:
    joints:
      [l-joint1, l-joint2, l-joint3, l-joint4, l-joint5, l-joint6, l-joint7]
  gripper:
    joints: [l-gripper]

gripper_mapping:
  closed_value: 0.0
  open_value: 2.64

gripper_force_control:
  enabled: false
  close_speed: 1.0
  contact_torque: 0.8
  overload_torque: 1.5
  motion_window_s: 0.2
  stall_movement: 0.01
  min_position_error: 0.05
  contact_hold_s: 0.2
  overload_hold_s: 0.05
  hold_offset: 0.08
  retreat_distance: 0.15
  max_step_interval_s: 0.05
  overload_retreat_interval_s: 0.1
  hold_kp: 2.0
  hold_kd: 0.5

# Initial gains are conservative values derived from the existing ARX profile.
# Verify and tune them on supported hardware before carrying a payload.
joints:
  # Control gains are tiered by actuator capability:
  # joint1-2 (40 Nm), joint3-4 (20 Nm), joint5-7 (8 Nm).
  - name: l-joint1
    motor_id: 0x09
    feedback_id: 0x19
    model: "8009"
    torque_range: 40.0
    direction: 1
    MIT: {kp: 120.0, kd: 8.0}
    POS_VEL: {vel_kp: 0.0125, vel_ki: 0.004, pos_kp: 150.0, pos_ki: 0.5, vlim: 3.0}

  - name: l-joint2
    motor_id: 0x0A
    feedback_id: 0x1A
    model: "8009"
    torque_range: 40.0
    MIT: {kp: 120.0, kd: 8.0}
    POS_VEL: {vel_kp: 0.0125, vel_ki: 0.004, pos_kp: 150.0, pos_ki: 0.5, vlim: 3.0}

  - name: l-joint3
    motor_id: 0x0B
    feedback_id: 0x1B
    model: "4340P"
    torque_range: 20.0
    MIT: {kp: 60.0, kd: 4.0}
    POS_VEL: {vel_kp: 0.008, vel_ki: 0.003, pos_kp: 100.0, pos_ki: 0.75, vlim: 2.5}

  - name: l-joint4
    motor_id: 0x0C
    feedback_id: 0x1C
    model: "4340P"
    torque_range: 20.0
    direction: -1
    MIT: {kp: 60.0, kd: 4.0}
    POS_VEL: {vel_kp: 0.008, vel_ki: 0.003, pos_kp: 100.0, pos_ki: 0.75, vlim: 2.5}

  - name: l-joint5
    motor_id: 0x0D
    feedback_id: 0x1D
    model: "4310"
    torque_range: 8.0
    MIT: {kp: 18.0, kd: 2.0}
    POS_VEL: {vel_kp: 0.005, vel_ki: 0.002, pos_kp: 50.0, pos_ki: 1.0, vlim: 2.0}

  - name: l-joint6
    motor_id: 0x0E
    feedback_id: 0x1E
    model: "4310"
    torque_range: 8.0
    MIT: {kp: 18.0, kd: 2.0}
    POS_VEL: {vel_kp: 0.005, vel_ki: 0.002, pos_kp: 50.0, pos_ki: 1.0, vlim: 2.0}

  - name: l-joint7
    motor_id: 0x0F
    feedback_id: 0x1F
    model: "4310"
    torque_range: 8.0
    MIT: {kp: 18.0, kd: 2.0}
    POS_VEL: {vel_kp: 0.005, vel_ki: 0.002, pos_kp: 50.0, pos_ki: 1.0, vlim: 2.0}

  - name: l-gripper
    motor_id: 0x10
    feedback_id: 0x20
    model: "4310"
    MIT: {kp: 4.0, kd: 0.5}
    POS_VEL: {vel_kp: 0.0008, vel_ki: 0.002, pos_kp: 50.0, pos_ki: 1.0, vlim: 3.0}
